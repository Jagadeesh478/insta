<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Instagram Fake Account Detector — ThreatShield</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#050b18;--surface:rgba(13,27,51,.7);--border:rgba(99,179,237,.15);--insta:#e1306c;--text:#e2e8f0;--muted:#94a3b8;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;z-index:-1;
      background:radial-gradient(ellipse 70% 50% at 15% 15%,rgba(225,48,108,.15) 0%,transparent 60%),
                 radial-gradient(ellipse 60% 50% at 85% 80%,rgba(124,58,237,.12) 0%,transparent 60%);}

    header{display:flex;align-items:center;justify-content:space-between;padding:1rem 3rem;
      border-bottom:1px solid var(--border);backdrop-filter:blur(12px);
      position:sticky;top:0;z-index:100;background:rgba(5,11,24,.8);}
    .logo{font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,#e1306c,#f56040);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .back{font-size:.82rem;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:.4rem;}
    .back:hover{color:var(--text);}

    .container{max-width:780px;margin:0 auto;padding:3rem 1.5rem;}

    .page-header{text-align:center;margin-bottom:2.5rem;}
    .page-header h1{font-size:2.2rem;font-weight:800;letter-spacing:-1px;
      background:linear-gradient(135deg,#fff 20%,#f9a8c9);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .page-header p{color:var(--muted);margin-top:.5rem;font-size:.95rem;}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;
      padding:2rem;backdrop-filter:blur(16px);margin-bottom:1.5rem;}

    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
    .form-group{display:flex;flex-direction:column;gap:.4rem;}
    .form-group.full{grid-column:1/-1;}
    label{font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
    input,select,textarea{
      background:rgba(255,255,255,.04);border:1px solid var(--border);
      border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;
      font-size:.9rem;padding:.7rem 1rem;width:100%;
      transition:border-color .2s,box-shadow .2s;outline:none;}
    input:focus,select:focus,textarea:focus{border-color:rgba(225,48,108,.5);box-shadow:0 0 0 3px rgba(225,48,108,.1);}
    select option{background:#0d1b33;}
    textarea{resize:vertical;min-height:70px;}

    .btn{width:100%;padding:.85rem;border:none;border-radius:12px;font-size:1rem;
      font-weight:700;cursor:pointer;background:linear-gradient(135deg,#e1306c,#f56040);
      color:#fff;transition:opacity .2s,transform .2s;margin-top:.5rem;}
    .btn:hover{opacity:.88;transform:translateY(-1px);}
    .btn:active{transform:scale(.98);}
    .btn:disabled{opacity:.5;cursor:not-allowed;}

    /* result */
    #result{display:none;}
    .risk-meter{height:14px;border-radius:999px;background:rgba(255,255,255,.08);
      overflow:hidden;margin:.75rem 0;}
    .risk-fill{height:100%;border-radius:999px;transition:width 1s cubic-bezier(.4,0,.2,1);}
    .risk-low    .risk-fill{background:linear-gradient(90deg,#10b981,#34d399);}
    .risk-mod    .risk-fill{background:linear-gradient(90deg,#f59e0b,#fcd34d);}
    .risk-high   .risk-fill{background:linear-gradient(90deg,#ef4444,#f87171);}

    .score-box{display:flex;align-items:center;gap:1.5rem;margin-bottom:1rem;}
    .score-num{font-size:4rem;font-weight:900;line-height:1;}
    .score-detail{flex:1;}
    .score-level{font-size:1.1rem;font-weight:700;margin-bottom:.2rem;}
    .score-confidence{font-size:.8rem;color:var(--muted);}

    .reasons-list{list-style:none;display:flex;flex-direction:column;gap:.5rem;margin-top:.75rem;}
    .reasons-list li{background:rgba(255,255,255,.04);border-radius:9px;
      padding:.6rem .9rem;font-size:.88rem;border-left:3px solid;}
    .risk-high li{border-color:#ef4444;}
    .risk-mod  li{border-color:#f59e0b;}
    .risk-low  li{border-color:#10b981;}

    .recs-list{list-style:none;display:flex;flex-direction:column;gap:.45rem;margin-top:.75rem;}
    .recs-list li{font-size:.85rem;color:var(--muted);padding:.4rem 0;}

    .section-title{font-size:.78rem;font-weight:700;letter-spacing:1px;
      text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;}

    .spinner{display:none;width:28px;height:28px;border:3px solid rgba(255,255,255,.1);
      border-top-color:#e1306c;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .history-link{text-align:center;margin-top:1rem;}
    .history-link a{color:#f9a8c9;font-size:.85rem;text-decoration:none;}
    .history-link a:hover{text-decoration:underline;}
  </style>
</head>
<body>
<header>
  <div class="logo">📸 Instagram Detector</div>
  <a class="back" href="/">← Back to ThreatShield</a>
</header>

<div class="container">
  <div class="page-header">
    <h1>Instagram Risk Analyzer</h1>
    <p>Enter account details below to generate a comprehensive risk assessment</p>
  </div>

  <div class="card">
    <form id="instaForm">
      <div class="form-grid">
        <div class="form-group full">
          <label>Username *</label>
          <input id="username" type="text" placeholder="e.g. johndoe123" required />
        </div>
        <div class="form-group">
          <label>Followers</label>
          <input id="followers" type="number" min="0" placeholder="e.g. 250" />
        </div>
        <div class="form-group">
          <label>Following</label>
          <input id="following" type="number" min="0" placeholder="e.g. 1200" />
        </div>
        <div class="form-group">
          <label>Posts Count</label>
          <input id="posts" type="number" min="0" placeholder="e.g. 3" />
        </div>
        <div class="form-group">
          <label>Account Age (days)</label>
          <input id="age" type="number" min="0" placeholder="e.g. 15" />
        </div>
        <div class="form-group">
          <label>Verified?</label>
          <select id="verified">
            <option value="">Unknown</option>
            <option value="true">Yes — Verified ✓</option>
            <option value="false">No — Not Verified</option>
          </select>
        </div>
        <div class="form-group">
          <label>Visibility</label>
          <select id="visibility">
            <option value="">Unknown</option>
            <option value="public">Public</option>
            <option value="private">Private</option>
          </select>
        </div>
        <div class="form-group">
          <label>Profile Picture</label>
          <select id="profile_pic">
            <option value="">Unknown</option>
            <option value="yes">Has Profile Pic</option>
            <option value="no">No Profile Pic</option>
            <option value="suspicious">Suspicious</option>
          </select>
        </div>
        <div class="form-group">
          <label>Bio Links</label>
          <select id="bio_links">
            <option value="">None / Unknown</option>
            <option value="yes">Has Link</option>
            <option value="multiple">Multiple Links</option>
            <option value="suspicious">Suspicious Link</option>
          </select>
        </div>
        <div class="form-group">
          <label>DM Activity</label>
          <select id="dm_activity">
            <option value="">Unknown</option>
            <option value="normal">Normal</option>
            <option value="unsolicited">Unsolicited DMs</option>
            <option value="suspicious">Suspicious DMs</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Bio Text</label>
          <textarea id="bio_text" placeholder="Paste bio text here (optional)…"></textarea>
        </div>
      </div>
      <div class="spinner" id="spinner"></div>
      <button class="btn" type="submit" id="submitBtn">🔍 Analyze Account</button>
    </form>
  </div>

  <div class="card" id="result">
    <div class="score-box" id="scoreBox">
      <div class="score-num" id="scoreNum"></div>
      <div class="score-detail">
        <div class="score-level" id="riskLevel"></div>
        <div class="score-confidence" id="confidence"></div>
      </div>
    </div>
    <div class="risk-meter" id="riskMeter"><div class="risk-fill" id="riskFill" style="width:0%"></div></div>

    <div class="section-title" style="margin-top:1.25rem;">Risk Indicators</div>
    <ul class="reasons-list" id="reasonsList"></ul>

    <div class="section-title" style="margin-top:1.25rem;">Recommendations</div>
    <ul class="recs-list" id="recsList"></ul>
  </div>

  <div class="history-link"><a href="/instagram/history">📜 View Analysis History</a></div>
</div>

<script>
  document.getElementById('instaForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    btn.disabled = true; spinner.style.display = 'block';
    document.getElementById('result').style.display = 'none';

    const payload = {
      username:       document.getElementById('username').value.trim(),
      followers:      parseInt(document.getElementById('followers').value)||null,
      following:      parseInt(document.getElementById('following').value)||null,
      posts:          parseInt(document.getElementById('posts').value)||null,
      account_age_days: parseInt(document.getElementById('age').value)||null,
      verified:       document.getElementById('verified').value === 'true' ? true :
                      document.getElementById('verified').value === 'false' ? false : null,
      visibility:     document.getElementById('visibility').value || null,
      has_profile_pic:document.getElementById('profile_pic').value || null,
      bio_links:      document.getElementById('bio_links').value || null,
      dm_activity:    document.getElementById('dm_activity').value || null,
      bio_text:       document.getElementById('bio_text').value || '',
    };

    try {
      const r = await fetch('/instagram/analyze', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload)
      });
      const d = await r.json();
      if (d.error) { alert('Error: ' + d.error); return; }
      renderResult(d);
    } catch(err) {
      alert('Network error: ' + err.message);
    } finally {
      btn.disabled = false; spinner.style.display = 'none';
    }
  });

  function renderResult(d) {
    const resultEl = document.getElementById('result');
    const score = d.risk_score;
    const cls = score >= 65 ? 'risk-high' : score >= 40 ? 'risk-mod' : 'risk-low';

    resultEl.className = 'card ' + cls;
    document.getElementById('scoreNum').textContent = score;
    document.getElementById('riskLevel').textContent = d.risk_level;
    document.getElementById('confidence').textContent = `Confidence: ${d.confidence_label} (${d.confidence}%)`;

    const fill = document.getElementById('riskFill');
    fill.style.width = '0%';
    setTimeout(() => fill.style.width = score + '%', 50);

    document.getElementById('reasonsList').innerHTML =
      d.reasons.map(r => `<li>${r}</li>`).join('');
    document.getElementById('recsList').innerHTML =
      d.recommendations.map(r => `<li>${r}</li>`).join('');

    resultEl.style.display = 'block';
    resultEl.scrollIntoView({behavior:'smooth', block:'start'});
  }
</script>
</body>
</html>
