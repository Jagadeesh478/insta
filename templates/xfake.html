<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>X / Twitter Fake Account Detector — ThreatShield</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#050b18;--surface:rgba(13,27,51,.7);--border:rgba(99,179,237,.15);--xbird:#1d9bf0;--text:#e2e8f0;--muted:#94a3b8;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;z-index:-1;
      background:radial-gradient(ellipse 70% 50% at 15% 20%,rgba(29,155,240,.15) 0%,transparent 60%),
                 radial-gradient(ellipse 60% 50% at 80% 80%,rgba(3,105,161,.1) 0%,transparent 60%);}
    header{display:flex;align-items:center;justify-content:space-between;padding:1rem 3rem;
      border-bottom:1px solid var(--border);backdrop-filter:blur(12px);
      position:sticky;top:0;z-index:100;background:rgba(5,11,24,.8);}
    .logo{font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,#1d9bf0,#60c8ff);
      -webkit-background-clip: text; 
      background-clip: text; 
      -webkit-text-fill-color: transparent;}
    .back{font-size:.82rem;color:var(--muted);text-decoration:none;}
    .back:hover{color:var(--text);}
    .container{max-width:720px;margin:0 auto;padding:3rem 1.5rem;}
    .page-header{text-align:center;margin-bottom:2.5rem;}
    .page-header h1{font-size:2.2rem;font-weight:800;letter-spacing:-1px;
      background:linear-gradient(135deg,#fff 20%,#93c5fd);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;}
    .page-header p{color:var(--muted);margin-top:.5rem;font-size:.95rem;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;
      padding:2rem;backdrop-filter:blur(16px);margin-bottom:1.5rem;}
    .scan-row{display:flex;gap:.75rem;}
    .scan-row input{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);
      border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;
      font-size:.95rem;padding:.75rem 1.1rem;outline:none;transition:border-color .2s,box-shadow .2s;}
    .scan-row input:focus{border-color:rgba(29,155,240,.5);box-shadow:0 0 0 3px rgba(29,155,240,.12);}
    .scan-row button{padding:.75rem 1.5rem;border:none;border-radius:10px;
      background:linear-gradient(135deg,#1d9bf0,#0369a1);color:#fff;font-family:'Inter',sans-serif;
      font-size:.95rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
    .scan-row button:hover{opacity:.88;}
    .scan-row button:disabled{opacity:.4;cursor:not-allowed;}

    /* progress */
    #xProgressUI { display: none; margin-top: 1.5rem; text-align: center; }
    .x-status { font-size: 0.9rem; color: var(--muted); margin-bottom: 0.8rem; font-weight: 600; }
    .progress-track { width: 100%; height: 6px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
    .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #1d9bf0, #60c8ff); transition: width 0.3s; }
    .x-badge { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.4rem 1rem; border-radius: 99px; background: rgba(29,155,240,0.1); border: 1px solid rgba(29,155,240,0.2); color: #1d9bf0; font-size: 0.75rem; font-weight: 800; margin-bottom: 1rem; text-transform: uppercase; }
    .x-dot { width: 8px; height: 8px; background: #1d9bf0; border-radius: 50%; animation: pulse-x 1.5s infinite; }
    @keyframes pulse-x { 0% { box-shadow: 0 0 0 0 rgba(29,155,240, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(29,155,240, 0); } 100% { box-shadow: 0 0 0 0 rgba(29,155,240, 0); } }

    .sim-badge { display: inline-block; padding: 0.3rem 0.7rem; background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); color: #fcd34d; border-radius: 6px; font-size: 0.7rem; font-weight: 800; margin-bottom: 1rem; text-transform: uppercase; }
  </style>
</head>
<body>
<header>
  <div class="logo">𝕏 Twitter Detector</div>
  <a class="back" href="/">← Back to ThreatShield</a>
</header>

<div class="container">
  <div class="page-header">
    <h1>X / Twitter Fake Account Detector</h1>
    <p>Enter a Twitter/X username to run a real-time authenticity check</p>
  </div>

  <div class="card">
    <form id="xForm">
      <div class="scan-row">
        <input id="xUsername" type="text" placeholder="Enter username (e.g. elonmusk)" required />
        <button type="submit" id="xBtn">🔍 Analyze</button>
      </div>
    </form>
    
    <div id="xProgressUI">
      <div class="x-badge"><div class="x-dot"></div> Live Analysis Active</div>
      <div class="x-status" id="xStatus">Connecting to X API v2 stream...</div>
      <div class="progress-track"><div class="progress-fill" id="xProgressFill"></div></div>
    </div>
  </div>

  <div id="resultBox">
    <div id="resultInner"></div>
  </div>
</div>

<script>
  const xSteps = [
    "Establishing secure handshake with X Developer API...",
    "Retrieving public profile metrics and metadata...",
    "Analyzing account creation age and verified status...",
    "Scanning tweet history for automated patterns...",
    "Evaluating follower-to-following quality score...",
    "Running rule-based ML detection algorithm...",
    "Finalizing authenticity assessment report..."
  ];

  document.getElementById('xForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('xBtn');
    const progressUI = document.getElementById('xProgressUI');
    const fill = document.getElementById('xProgressFill');
    const status = document.getElementById('xStatus');
    const resultBox = document.getElementById('resultBox');
    const input = document.getElementById('xUsername');

    btn.disabled = true;
    progressUI.style.display = 'block';
    resultBox.style.display = 'none';
    input.style.opacity = '0.5';

    // Simulate progress
    for(let i=0; i<xSteps.length; i++) {
        status.textContent = xSteps[i];
        fill.style.width = ((i+1) / xSteps.length * 100) + '%';
        await new Promise(r => setTimeout(r, 600 + Math.random() * 400));
    }

    const formData = new FormData();
    formData.append('username', input.value.trim());

    try {
      const r = await fetch('/xfake/analyze', { method: 'POST', body: formData });
      const d = await r.json();
      renderResult(d);
    } catch(err) {
      document.getElementById('resultInner').innerHTML = `
        <div class="error-box"><strong>❌ Error:</strong> ${err.message}</div>`;
      document.getElementById('resultBox').style.display = 'block';
    } finally {
      btn.disabled = false;
      progressUI.style.display = 'none';
      fill.style.width = '0%';
      input.style.opacity = '1';
    }
  });

  function renderResult(d) {
    const box = document.getElementById('resultBox');
    const inner = document.getElementById('resultInner');
    if (d.error) {
      inner.innerHTML = `<div class="error-box"><strong>❌ ${d.error}</strong></div>`;
      box.style.display = 'block';
      return;
    }
    const res = d.result;
    const cls = res.classification === 'Likely Fake' ? 'fake' :
                res.classification === 'Suspicious'   ? 'suspicious' : 'genuine';
    const icon = cls === 'fake' ? '🚨' : cls === 'suspicious' ? '⚠️' : '✅';

    inner.innerHTML = `
      <div class="result-inner ${cls}">
        ${res.is_simulated ? `<div class="sim_badge">⚡ Demonstration Mode (${res.simulation_reason})</div>` : ''}
        <div class="verdict-row">
          <div class="verdict-icon">${icon}</div>
          <div>
            <div class="verdict-text">${res.classification}</div>
            <div style="font-size:.85rem;color:var(--muted);">@${res.username} — ${res.name}</div>
          </div>
        </div>
        <div style="font-size:.85rem;color:var(--muted);margin-bottom:.4rem;">Suspicion Score: <strong>${res.suspicion_score}%</strong></div>
        <div class="score-bar-wrap"><div class="score-bar" style="width:${res.suspicion_score}%"></div></div>

        <div class="stats-row">
          <div class="stat-item"><strong>${res.profile_stats.followers.toLocaleString()}</strong><small>Followers</small></div>
          <div class="stat-item"><strong>${res.profile_stats.following.toLocaleString()}</strong><small>Following</small></div>
          <div class="stat-item"><strong>${res.profile_stats.tweets.toLocaleString()}</strong><small>Tweets</small></div>
          <div class="stat-item"><strong>${res.profile_stats.account_age_days}</strong><small>Days Old</small></div>
          <div class="stat-item"><strong>${res.profile_stats.verified ? '✓' : '✗'}</strong><small>Verified</small></div>
        </div>

        ${res.suspicious_signals.length > 0 ? `
          <div class="section-title" style="margin-top:.75rem;">🔍 Suspicious Indicators</div>
          <ul class="signals-list">
            ${res.suspicious_signals.map(s => `<li>${s}</li>`).join('')}
          </ul>
        ` : '<p style="color:var(--muted);font-size:.87rem;margin-top:.5rem;">✅ No major suspicious indicators found.</p>'}
      </div>`;
    box.style.display = 'block';
    box.scrollIntoView({behavior:'smooth', block:'start'});
  }
</script>
</body>
</html>
</body>
</html>
